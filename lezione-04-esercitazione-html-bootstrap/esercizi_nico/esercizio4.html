<!--
ESERCIZIO 4 — Form semplice
----------------------------------------
Consegna:
  Crea un file "es4.html" con Bootstrap. Crea un form con due campi:
  uno per il nome (input di tipo text) e uno per l'email (input di
  tipo email), ciascuno con la sua etichetta (<label>) collegata
  tramite "for" e "id". Aggiungi in fondo un pulsante "Invia".

Risultato atteso:
  Un form verticale con due campi ben etichettati e un pulsante
  colorato Bootstrap sotto di essi.
-->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <title>form semplice</title>
</head>
<body>
  <div id="form">
      <div class="mb-3">
        <label  for="disabledTextInput" class="form-label"> nome </label>
        <input type="text" id="disabledTextInput" class="form-control">
      </div>
      <div class="mb-3">
        <label for="disabledTextInput" class="form-label">email</label>
        <input type="email" id="disabledTextInput" class="form-control">
        
      </div>

       <button type="button" class="btn btn-primary">invia</button>
  </div>

</body>

</html>
