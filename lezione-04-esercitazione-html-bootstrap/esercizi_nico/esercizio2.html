<!--
ESERCIZIO 2 — Tabella Bootstrap con thead e tbody
----------------------------------------
Consegna:
  Crea un file "es2.html" con Bootstrap collegato da CDN. Crea una
  tabella con l'intestazione (<thead>) che contiene le colonne:
  Materia, Ore settimanali, Docente. Nel corpo (<tbody>) inserisci
  almeno 5 righe con materie scolastiche a tua scelta. Applica le
  classi Bootstrap per rendere la tabella più leggibile (righe
  alternate e bordi visibili).

Risultato atteso:
  Una tabella con intestazione ben distinta dal corpo, righe alternate
  chiaro/bianco, bordi visibili e dati allineati in colonne.

-->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <title>materie</title>
</head>

<body>
  <table class="table table-success table-striped-columns">
    <thead>
      <tr>
        <th>materia</th>
        <th>ore settimanali</th>
        <th>docente</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>scienze</td>
        <td>5</td>
        <td>vignali</td>
      </tr>
      <tr>
        <td>matematica</td>
        <td>4</td>
        <td>de salvo</td>
      </tr>
      <tr>
        <td>storia</td>
        <td>2</td>
        <td>sesia</td>
      </tr>
      <tr>
        <td>inglese</td>
        <td>3</td>
        <td>ventura</td>
      </tr>
      <tr>
        <td>fisica</td>
        <td>3</td>
        <td>quaroni</td>
      </tr>


    </tbody>




  </table>


</body>

</html>
