<!--
ESERCIZIO 5 — Form Bootstrap completo
----------------------------------------
Consegna:
  Crea un file "es5.html" con Bootstrap. Realizza un form di
  iscrizione con questi campi:
  - nome
  - cognome
  - email
  - data di nascita (input di tipo date)
  - un menu a tendina (select) con almeno 3 opzioni, ad esempio la
    scelta di un corso pomeridiano (es. Teatro, Musica, Sport)
  - una textarea per un breve messaggio di presentazione
  - una checkbox per accettare il regolamento del corso
  - un pulsante "Iscriviti"

Risultato atteso:
  Un form completo con tutti i campi elencati, ognuno con etichetta
  associata, organizzato in modo ordinato dall'alto verso il basso.

Suggerimento Bootstrap:
  Usa form-label, form-control, form-select, form-check,
  form-check-input, form-check-label.
-->

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <title>form completo</title>
</head>

<body>
  <div id="form">
    <div>
      <label>nome</label>
      <input type="text">
    </div>
    <div>
      <label>cognome</label>
      <input type ="text">
    </div>
    <div>
      <label>email</label>
      <input type="email">
    </div>
    <div>
      <label>data di nascita</label>
      <input type="date">
    </div>
    <div>
      <select>
        <option value="teatro"> teatro </option>
        <option value="muisca"> musica</option>
        <option value="sport">sport</option>
      </select>
    </div>
    <div>
      <label> presentazione </label>
      <input type="textarea">
    </div>
    <div>
     <label> checcami </label>
      <input type="checkbox">
    </div>
<div>
  <button type="submit">invia</button>
</div>
   

  </div>

</body>

</html>
