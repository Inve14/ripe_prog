<!--
Blog

Struttura con sidebar: a sinistra la parte principale con articoli (titolo, data, immagine, testo introduttivo), 
e una sidebar a destra con widget (“Categorie”, “Articoli recenti”). Inserire un testo a caso.
Usare il sistema di griglia per le colonne.
-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sidebar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>
    <div class="row">
        <div class="col">
            <!--articoli-->
            <div class="card mb-4">
                <img src="https://via.placeholder.com/800x200" class="card-img-top" alt="immagine">
                <div class="card-body">
                    <h2 class="card-title">Titolo articolo</h2>
                    <p class="text-muted small">12 gennaio 2025</p>
                    <p class="card-text">Lorem ipsum dolor sit amet.</p>
                    <a href="#" class="btn btn-primary">Leggi di più</a>
                </div>
            </div>
        </div>
        <div class="col">
            <!--widget-->
            <div class="card mb-4">
                <div class="card-header bg-dark text-white">Categorie</div>
                <div class="card-body">
                    <ul class="list-unstyled mb-0">
                        <li>🔹 Tecnologia</li>
                        <li>🔹 Sport</li>
                        <li>🔹 Cucina</li>
                    </ul>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
