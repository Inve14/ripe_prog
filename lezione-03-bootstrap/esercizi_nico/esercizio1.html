<!--
Crea una tabella Bootstrap con 3 colonne (Nome, Cognome, Età) e 4 righe di dati. Usa table-striped e table-bordered.
-->

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

</body>
</html>
