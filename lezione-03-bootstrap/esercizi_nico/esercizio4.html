<!--
Crea una tabella Bootstrap con una colonna "Voto" che usa badge colorati: 
verde se il voto è sufficiente, 
rosso se insufficiente. 
I dati sono fissi nell'HTML, non serve JS.
-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voti</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>voto</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="table-success">
                 6
                </td>
            </tr>
            <tr>
                <td class="table-danger">
                 4
                </td>
            </tr>
            <tr>
                <td class="table-danger">
                 5
                </td>
            </tr>
            <tr>
                 <td class="table-success">
                8
                </td>
            </tr>
            <tr>
                <td class="table-danger">
                   5 
                </td>
            </tr>
        </tbody>
    </table>


</body>

</html>
