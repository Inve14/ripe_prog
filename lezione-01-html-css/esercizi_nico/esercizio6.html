<!--
[ Esercizio 6 ] — Tabella orario scolastico
---------------------------------------------

Consegna:
  Costruisci una tabella con l'orario settimanale di
  5 giorni (lun-ven) e almeno 4 ore al giorno.
  La tabella deve avere:
    - Una riga di intestazione (<thead>) con i giorni
    - Una colonna a sinistra con gli orari (8:00, 9:00...)
    - Le materie nelle celle corrispondenti
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>orario settimanale</h1>
    <table border="1">
    <thead>
        <tr>
            <th>ora</th>
            <th>lunedì</th>
            <th>martedì</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>8-13</td>
            <td>gioco</td>
            <td>guardiano bambini</td>
        </tr>
        <tr>
            <td>14-17</td>
            <td>grattamento palle</td>
            <td>stupro bambini</td>
        </tr>
    </tbody>
    </table>
</body>
</html>
