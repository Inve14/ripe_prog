<!--
[ Esercizio 5 ] — Form di contatto
-------------------------------------

Consegna:
  Il form deve avere questi campi:
    - Nome (input di tipo text, obbligatorio)
    - Email (input di tipo email, obbligatorio)
    - Argomento (select con 3 opzioni a scelta)
    - Messaggio (usa il tag <textarea>, almeno 4 righe)
    - Un pulsante "Invia messaggio"
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form method= "post"> 
        <input type="text" placeholder="inserisci nome">
        <input type="number" placeholder="inserisci eta'">
        <input type="email" placeholder="scrivi email">
        <select name = "gender" >
            <option value="male"> maschio </option>
            <option value="female"> femmina </option>
            <option value="other"> altro </option>              
        </select>
        <button type="submit"> invia </button>

    </form>
    
    
</body>
</html>
